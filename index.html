<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>问读 · AskRead</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{ --bg:#f6f7f9; --panel:#fff; --ink:#1c1f23; --muted:#6b7280; --line:#e5e7eb; --accent:#4f46e5; --accent2:#eef2ff; --pageFilter:none; --card:#fff; }
  [data-theme="sepia"]{ --bg:#f4ecd8; --panel:#fbf4e3; --ink:#43381f; --muted:#8a7a55; --line:#e3d6b5; --accent:#9a6b2f; --accent2:#efe2c4; --pageFilter:sepia(.35) brightness(.97); --card:#fbf4e3; }
  [data-theme="dark"]{ --bg:#16181d; --panel:#1e2127; --ink:#e6e8ec; --muted:#9aa0aa; --line:#2c303a; --accent:#8b87ff; --accent2:#262a36; --pageFilter:invert(.9) hue-rotate(180deg); --card:#1e2127; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;background:var(--bg);color:var(--ink);height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:15px;margin:0;font-weight:600;white-space:nowrap}
  .title{font-size:13px;color:var(--muted);max-width:30vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #pageNav{display:flex;align-items:center;gap:5px}
  #pageInput{width:52px;text-align:center;border:1px solid var(--line);border-radius:7px;padding:5px 4px;font-size:13px;background:var(--panel);color:var(--ink)}
  #pageInput::-webkit-inner-spin-button{opacity:.4}
  .btn{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:6px 11px;font-size:13px;cursor:pointer;color:var(--ink)}
  .btn:hover{filter:brightness(.96)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .spacer{flex:1}
  .main{flex:1;min-height:0;display:flex;overflow:hidden;position:relative}

  #library{flex:1;overflow:auto;padding:22px}
  .shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:18px;max-width:1100px;margin:0 auto}
  .book{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:.15s;position:relative}
  .book:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.12)}
  .book .cover{aspect-ratio:3/4;background:#d9dbe0;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .book .cover img{width:100%;height:100%;object-fit:cover}
  .book .meta{padding:9px 10px}
  .book .bt{font-size:13px;font-weight:600;line-height:1.35;max-height:3.6em;overflow:hidden}
  .book .prog{font-size:11px;color:var(--muted);margin-top:5px}
  .book .del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:14px;line-height:1;display:none}
  .book:hover .del{display:block}
  .addbook{border:2px dashed var(--line);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--muted);cursor:pointer;aspect-ratio:3/4;font-size:14px;gap:6px}
  .addbook:hover{border-color:var(--accent);color:var(--accent)}
  .addbook .plus{font-size:34px}

  #reader{flex:1;display:flex;overflow:hidden}
  #viewer{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .pageWrap{position:relative;box-shadow:0 1px 6px rgba(0,0,0,.18);background:#fff;flex:0 0 auto}
  .pageWrap canvas{display:block;filter:var(--pageFilter)}
  .textLayer{position:absolute;inset:0;overflow:hidden;opacity:.2;line-height:1}
  .textLayer span{color:transparent;position:absolute;white-space:pre;cursor:text;transform-origin:0 0}
  .textLayer ::selection{background:rgba(79,70,229,.4)}
  .hlLayer{position:absolute;inset:0;pointer-events:none}
  .hl{position:absolute;background:rgba(255,214,0,.45);border-radius:2px;mix-blend-mode:multiply}
  [data-theme="dark"] .hl{mix-blend-mode:screen;background:rgba(255,214,0,.3)}
  .placeholder{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}

  #panel{width:380px;min-width:300px;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column}
  .tabs{display:flex;border-bottom:1px solid var(--line)}
  .tabs button{flex:1;border:none;background:none;padding:10px 4px;font-size:13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent}
  .tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .tabpane{flex:1;overflow:auto;padding:12px;display:none;flex-direction:column;gap:10px}
  .tabpane.active{display:flex}
  .msg{padding:9px 11px;border-radius:10px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .msg.me{background:var(--accent2);align-self:flex-end;max-width:92%}
  .msg.ai{background:rgba(125,125,125,.12);align-self:flex-start;max-width:100%;white-space:normal}
  .msg .q{font-size:11px;color:var(--muted);margin-bottom:4px}
  .msg.ai .mdh{font-weight:600;margin:8px 0 3px}
  .msg.ai .mdli{margin:3px 0;line-height:1.6}
  .msg.ai p{margin:6px 0}
  .msg.ai code{background:rgba(125,125,125,.18);padding:1px 5px;border-radius:4px;font-size:13px}
  .msg.ai strong{font-weight:700}
  .copyBtn{display:block;margin-top:6px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:2px 2px;opacity:.7}
  .copyBtn:hover{color:var(--accent);opacity:1}
  .ask{border-top:1px solid var(--line);padding:9px;display:flex;flex-direction:column;gap:7px}
  .ask .scope{display:flex;gap:6px;font-size:12px;align-items:center;color:var(--muted)}
  .ask .scope select{border:1px solid var(--line);border-radius:6px;padding:3px 6px;background:var(--panel);color:var(--ink);font-size:12px}
  .ask .inrow{display:flex;gap:7px}
  .ask input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--panel);color:var(--ink)}
  #tab-find .inrow{display:flex;gap:7px}
  #tab-find input{flex:1;min-width:0;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--panel);color:var(--ink)}
  #tab-find #findBtn{white-space:nowrap;flex:0 0 auto}
  .note,.bm{border:1px solid var(--line);border-radius:8px;padding:9px;font-size:13px;cursor:pointer;background:var(--card)}
  .note:hover,.bm:hover{border-color:var(--accent)}
  .note .t{color:var(--ink);line-height:1.5}
  .note .n{color:var(--muted);font-size:12px;margin-top:4px;font-style:italic}
  .note .x,.bm .x{float:right;color:var(--muted);border:none;background:none;cursor:pointer;font-size:13px}
  .empty-hint{color:var(--muted);font-size:13px;text-align:center;margin-top:30px;line-height:1.7}

  #floatBar{position:fixed;z-index:50;display:none;gap:4px;background:#23262d;padding:5px;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.3)}
  #floatBar button{background:transparent;color:#fff;border:none;font-size:13px;cursor:pointer;padding:5px 8px;border-radius:6px;white-space:nowrap}
  #floatBar button:hover{background:rgba(255,255,255,.16)}

  #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:100}
  .card2{background:var(--panel);border-radius:14px;padding:22px;width:min(520px,92vw);max-height:90vh;overflow:auto;color:var(--ink)}
  .card2 h3{margin:0 0 6px}
  .card2 label{display:block;font-size:13px;margin:14px 0 4px;font-weight:600}
  .card2 input,.card2 select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--panel);color:var(--ink)}
  .card2 p{font-size:12.5px;color:var(--muted);line-height:1.6}
  .card2 a{color:var(--accent)}
  .rowend{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

  #panelToggle{display:none;position:absolute;top:50%;transform:translateY(-50%);right:380px;z-index:70;background:var(--panel);border:1px solid var(--line);border-right:none;border-radius:9px 0 0 9px;width:22px;height:52px;cursor:pointer;color:var(--muted);font-size:15px;box-shadow:-2px 0 6px rgba(0,0,0,.07)}
  body.reading #panelToggle{display:block}
  #panel.collapsed{display:none}
  @media(max-width:760px){ #panelToggle{display:none!important} }
  #transPop{position:fixed;max-width:340px;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;line-height:1.6;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:90}
  #transPop .tpc{font-size:11px;color:var(--muted);margin-bottom:3px}
  #refDock{width:320px;min-width:200px;background:var(--panel);border-right:1px solid var(--line);display:none;flex-direction:column;position:relative;overflow:hidden;min-height:0;align-self:stretch}
  body.refon #refDock{display:flex}
  #refToggle{display:none;position:absolute;top:50%;transform:translateY(-50%);z-index:70;background:var(--panel);border:1px solid var(--line);border-left:none;border-radius:0 9px 9px 0;width:22px;height:52px;cursor:pointer;color:var(--muted);font-size:15px;box-shadow:2px 0 7px rgba(0,0,0,.07);left:0}
  body.reading #refToggle{display:block}
  .rdhead{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600}
  .rdhead button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px}
  .rdbody{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;display:flex;flex-direction:column;gap:8px}
  #refDock.collapsed .rdbody{display:none}
  .refItem{flex:0 0 auto;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--card)}
  .refItem .rh{display:flex;align-items:center;gap:4px;padding:2px 4px;background:var(--accent2)}
  .refItem .rh span{flex:1;font-size:11px;color:var(--muted);padding-left:4px}
  .refItem .rh button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 6px}
  .refItem .rh button:hover{color:var(--accent)}
  .refItem img{width:100%;height:170px;object-fit:contain;object-position:top;background:var(--bg);display:block;cursor:zoom-in}
  .refItem img.full{height:auto;cursor:zoom-out}
  #rdResize{position:absolute;top:0;right:-3px;width:7px;height:100%;cursor:ew-resize;z-index:5}
  #sheetBackdrop{display:none}
  #snipBox{position:fixed;border:2px solid var(--accent);background:rgba(79,70,229,.16);z-index:80;pointer-events:none;border-radius:2px}
  body.snip #viewer{cursor:crosshair}
  body.snip{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
  body.snip #viewer, body.snip #viewer *{touch-action:none!important}
  #snipHint{display:none;position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:85;background:#23262d;color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;box-shadow:0 3px 10px rgba(0,0,0,.3)}
  body.snip #snipHint{display:block}
  #banner{display:none;background:#fde68a;color:#7c5700;padding:7px 12px;font-size:12.5px;text-align:center}
  @media(max-width:760px){
    #panel{position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;height:80vh;z-index:64;transform:translateY(100%);transition:transform .25s;border-left:none;border-top:1px solid var(--line);border-radius:14px 14px 0 0;box-shadow:0 -4px 16px rgba(0,0,0,.2)}
    #panel.open{transform:none}
    #sheetBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:62}
    .desk-only{display:none}
    .main{order:1}
    header{order:2;padding:8px 10px;padding-bottom:calc(8px + env(safe-area-inset-bottom));gap:8px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;justify-content:space-between;border-top:1px solid var(--line);border-bottom:none;z-index:55}
    header>*{flex-shrink:0}
    header h1{display:none}
    header .spacer{display:none}
    #titleEl{display:none}
    #langBtn{display:none}
    .btn{padding:7px 9px;font-size:13px}
    .bmtxt{display:none}
    #pageInput{width:44px}
    #pageTotal{font-size:12px}
    #viewer{padding:calc(12px + env(safe-area-inset-top)) 8px 12px}
    .tabs button{font-size:14px;padding:12px 4px}
    /* 16px 防止 iOS 聚焦输入框时自动放大 */
    .ask input,#findInput,#pageInput,.card2 input,.card2 select,.scope select{font-size:16px}
    #refToggle{display:none!important}
    #refDock{position:fixed;left:0;right:0;bottom:0;top:auto;width:auto!important;min-width:0;height:58vh;border:none;border-top:1px solid var(--line);border-radius:14px 14px 0 0;z-index:66;display:flex!important;flex-direction:column;transform:translateY(100%);transition:transform .25s;box-shadow:0 -4px 16px rgba(0,0,0,.2)}
    body.refon #refDock{transform:none}
    #refDock.collapsed .rdbody{display:flex}
    .rdhead{touch-action:none;cursor:row-resize}
    #rdResize{display:none}
  }
  .mobile-only{display:none}
  @media(max-width:760px){ .mobile-only{display:inline-block} }
</style>
</head>
<body data-theme="light">
<div id="banner"></div>
<div id="snipHint"></div>
<div id="sheetBackdrop"></div>
<header>
  <h1 data-i18n="appName">📖 问读</h1>
  <button class="btn" id="shelfBtn" data-i18n="shelf">书架</button>
  <span class="title" id="titleEl"></span>
  <span id="pageNav" style="display:none">
    <button class="btn" id="prevPg" data-i18n-title="prev">‹</button>
    <input id="pageInput" type="number" min="1" data-i18n-title="pageInput">
    <span class="title" id="pageTotal" style="max-width:none"></span>
    <button class="btn" id="nextPg" data-i18n-title="next">›</button>
  </span>
  <div class="spacer"></div>
  <span id="readerTools" style="display:none">
    <button class="btn desk-only" id="zoomOut">A−</button>
    <button class="btn desk-only" id="zoomIn">A+</button>
    <button class="btn" id="snipBtn" title="截图问AI / Snip & ask">📷<span class="bmtxt" data-i18n="snipWord"> 截取</span></button>
    <button class="btn" id="bmBtn" title="书签 / Bookmark">🔖<span class="bmtxt" data-i18n="bmWord"> 书签</span></button>
  </span>
  <button class="btn" id="langBtn">EN</button>
  <button class="btn" id="themeBtn">🌗</button>
  <button class="btn mobile-only" id="refMobileBtn" style="display:none">📌</button>
  <button class="btn mobile-only" id="togglePanel" style="display:none">AI</button>
  <button class="btn" id="settingsBtn">⚙</button>
</header>

<div class="main">
  <div id="refDock">
    <div class="rdhead"><span data-i18n="refTitle">参考</span><div class="spacer"></div><button id="rdClear" title="清空全部 / Clear all">🗑</button><button id="rdCollapse" class="desk-only" title="收起/展开">▾</button><button id="rdClose" class="mobile-only" title="关闭">×</button></div>
    <div class="rdbody" id="rdBody"></div>
    <div id="rdResize"></div>
  </div>
  <button id="refToggle" title="参考栏 / References">›</button>
  <div id="library">
    <div class="shelf" id="shelf">
      <div class="addbook" id="addCard"><div class="plus">＋</div><div data-i18n="addPdf">添加 PDF</div></div>
    </div>
  </div>
  <input type="file" id="file" accept="application/pdf" style="display:none">

  <div id="reader" style="display:none">
    <div id="viewer"></div>
    <button id="panelToggle" title="展开/收起 · Toggle panel">›</button>
    <div id="panel">
      <div class="tabs">
        <button data-tab="chat" class="active" data-i18n="tabAI">💬 AI</button>
        <button data-tab="find" data-i18n="tabFind">🔎 找页</button>
        <button data-tab="notes" data-i18n="tabNotes">✏️ 笔记</button>
        <button data-tab="marks" data-i18n="tabMarks">🔖 书签</button>
      </div>
      <div class="tabpane active" id="tab-chat"></div>
      <div class="tabpane" id="tab-find">
        <div class="inrow">
          <input id="findInput" data-i18n-ph="findPh">
          <button class="btn primary" id="findBtn" data-i18n="findBtn">找</button>
        </div>
        <div id="findResults" style="display:flex;flex-direction:column;gap:8px;margin-top:4px"></div>
      </div>
      <div class="tabpane" id="tab-notes"></div>
      <div class="tabpane" id="tab-marks"></div>
      <div class="ask">
        <div class="scope">
          <span data-i18n="scopeLabel">范围：</span>
          <select id="scope">
            <option value="sel" data-i18n="scopeSel">选中文字</option>
            <option value="page" data-i18n="scopePage">当前页</option>
            <option value="book" data-i18n="scopeBook">整本书</option>
          </select>
          <div class="spacer"></div>
          <button class="btn" id="clearChat" title="清空对话 / Clear chat" style="padding:3px 8px">🗑</button>
          <button class="btn mobile-only" id="closePanel" style="padding:3px 8px" data-i18n="close">关闭</button>
        </div>
        <div class="inrow">
          <input id="askInput" data-i18n-ph="askPh">
          <button class="btn primary" id="sendBtn" data-i18n="send">发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="floatBar">
  <button data-act="explain" data-i18n="fExplain">💡 解释</button>
  <button data-act="translate" data-i18n="fTranslate">🌐 翻译</button>
  <button data-act="summary" data-i18n="fSummary">📝 总结</button>
  <button data-act="highlight" data-i18n="fHighlight">🖍 高亮</button>
  <button data-act="pin" data-i18n="fPin" style="display:none">📌 钉住</button>
  <button data-act="ask" data-i18n="fAsk">❓ 提问</button>
</div>
<div id="transPop" style="display:none"></div>

<div id="modal">
  <div class="card2">
    <h3 data-i18n="setTitle">设置</h3>
    <p data-i18n="setIntro">本阅读器调用 Google Gemini 的免费额度。Key 只存在你本机浏览器，不上传任何服务器。</p>
    <label data-i18n="setKeyHow">免费拿 Key（30 秒）</label>
    <p data-i18n="setKeySteps">1. 打开 <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a> 用谷歌账号登录；2. 点 “Create API key”，复制 Key；3. 粘贴到下面保存。</p>
    <label data-i18n="setKey">API Key</label>
    <input id="apiKey" type="password" data-i18n-ph="setKeyPh">
    <label data-i18n="setModel">模型（免费层，额度从高到低）</label>
    <select id="model">
      <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
      <option value="gemini-2.5-flash">gemini-2.5-flash</option>
      <option value="gemini-2.5-pro">gemini-2.5-pro</option>
      <option value="gemini-flash-latest">gemini-flash-latest</option>
      <option value="gemini-flash-lite-latest">gemini-flash-lite-latest</option>
      <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
      <option value="gemini-3.1-flash-lite-preview">gemini-3.1-flash-lite-preview</option>
      <option value="__custom">⌨ 自定义 / Custom…</option>
    </select>
    <input id="modelCustom" style="margin-top:8px;display:none" data-i18n-ph="setModelCustom" placeholder="自定义模型名，如 gemini-3-pro-preview">
    <p data-i18n="setModelTip" style="margin-top:6px">提示：若提示「quota exceeded / limit: 0」，多半是该模型免费层无额度或当天用超，换额度更高的模型或隔一会再试。</p>
    <label data-i18n="setLang">语言 / Language</label>
    <select id="lang"><option value="中文">中文</option><option value="English">English</option></select>
    <div class="rowend">
      <button class="btn" id="closeModal" data-i18n="cancel">取消</button>
      <button class="btn primary" id="saveSettings" data-i18n="save">保存</button>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
const $ = s => document.querySelector(s);

/* ---------- i18n ---------- */
const I18N={

/* ---------- IndexedDB ---------- */
let DB=null, idbOK=true;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open('aireader',1);
  r.onupgradeneeded=e=>{const db=e.target.result;
    if(!db.objectStoreNames.contains('books'))db.createObjectStore('books',{keyPath:'id'});
    if(!db.objectStoreNames.contains('files'))db.createObjectStore('files',{keyPath:'id'});
    if(!db.objectStoreNames.contains('state'))db.createObjectStore('state',{keyPath:'id'});};
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);});}
function tx(store,mode){return DB.transaction(store,mode).objectStore(store);}
function dbGet(s,k){return new Promise((res,rej)=>{const r=tx(s,'readonly').get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbAll(s){return new Promise((res,rej)=>{const r=tx(s,'readonly').getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbPut(s,v){return new Promise((res,rej)=>{const r=tx(s,'readwrite').put(v);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function dbDel(s,k){return new Promise((res,rej)=>{const r=tx(s,'readwrite').delete(k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}

async function renderShelf(){
  const shelf=$('#shelf');
  [...shelf.querySelectorAll('.book')].forEach(n=>n.remove());
  if(!idbOK) return;
  const books=(await dbAll('books')).sort((a,b)=>b.opened-a.opened);
  for(const bk of books){
    const st=await dbGet('state',bk.id)||{};
    const pct = st.lastPage&&bk.pages? Math.round(st.lastPage/bk.pages*100):0;
    const el=document.createElement('div'); el.className='book';
    el.innerHTML=`<div class="cover">${bk.cover?`<img src="${bk.cover}">`:'📕'}</div>
      <div class="meta"><div class="bt">${escapeHtml(bk.name)}</div>
      <div class="prog">${bk.pages?t('prog')(bk.pages,pct):''}</div></div>
      <button class="del" title="×">×</button>`;
    el.onclick=e=>{ if(e.target.classList.contains('del')){delBook(bk.id);e.stopPropagation();return;} openBook(bk.id); };
    shelf.insertBefore(el,$('#addCard'));
  }
}
$('#addCard').onclick=()=>$('#file').click();
$('#file').onchange=async e=>{
  const f=e.target.files[0]; e.target.value=''; if(!f)return;
  const buf=await f.arrayBuffer();
  const doc=await pdfjsLib.getDocument({data:buf.slice(0)}).promise;
  const cover=await makeCover(doc);
  const id='b'+Date.now();
  const book={id,name:f.name.replace(/\.pdf$/i,''),pages:doc.numPages,cover,opened:Date.now()};
  if(idbOK){
    await dbPut('files',{id,blob:new Blob([buf],{type:'application/pdf'})});
    await dbPut('books',book);
    await dbPut('state',{id,lastPage:1,scrollRatio:0,bookmarks:[],highlights:[],chat:[]});
    await renderShelf();
  }
  openBookData(book,buf,{id,lastPage:1,scrollRatio:0,bookmarks:[],highlights:[],chat:[]});
};
async function makeCover(doc){
  const p=await doc.getPage(1); const vp=p.getViewport({scale:1});
  const s=180/vp.width; const v=p.getViewport({scale:s});
  const c=document.createElement('canvas'); c.width=v.width;c.height=v.height;
  await p.render({canvasContext:c.getContext('2d'),viewport:v}).promise;
  return c.toDataURL('image/jpeg',0.6);
}
async function delBook(id){ if(!confirm(t('delConfirm')))return; await dbDel('books',id);await dbDel('files',id);await dbDel('state',id); renderShelf(); }
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function inlineMd(s){ s=escapeHtml(s); s=s.replace(/`([^`]+)`/g,'<code>$1</code>'); s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'); s=s.replace(/__([^_]+)__/g,'<strong>$1</strong>'); s=s.replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>'); return s; }
function mdToHtml(text){
  const lines=(text||'').replace(/```[a-z]*\n?/gi,'').split('\n'); let html='', para=[];
  const flush=()=>{ if(para.length){ html+='<p>'+para.join('<br>')+'</p>'; para=[]; } };
  for(let raw of lines){ let m;
    if(/^\s*$/.test(raw)){ flush(); continue; }
    if(m=raw.match(/^\s*(#{1,6})\s+(.*)/)){ flush(); html+='<div class="mdh">'+inlineMd(m[2])+'</div>'; continue; }
    if(m=raw.match(/^(\s*)[\*\-•]\s+(.*)/)){ flush(); const lv=Math.min(3,Math.floor(m[1].length/2)); html+='<div class="mdli" style="padding-left:'+(10+lv*16)+'px">• '+inlineMd(m[2])+'</div>'; continue; }
    if(m=raw.match(/^(\s*)(\d+)[\.\)]\s+(.*)/)){ flush(); const lv=Math.min(3,Math.floor(m[1].length/2)); html+='<div class="mdli" style="padding-left:'+(10+lv*16)+'px">'+m[2]+'. '+inlineMd(m[3])+'</div>'; continue; }
    para.push(inlineMd(raw)); }
  flush(); return html;
}

async function openBook(id){
  const book=await dbGet('books',id); const fileRec=await dbGet('files',id);
  const buf=await fileRec.blob.arrayBuffer();
  const st=await dbGet('state',id)||{id,lastPage:1,scrollRatio:0,bookmarks:[],highlights:[],chat:[]};
  book.opened=Date.now(); if(idbOK)dbPut('books',book);
  openBookData(book,buf,st);
}
async function openBookData(book,buf,st){
  curBook=book; curState=st; allText=null; pageTexts=null;
  curState.bookmarks=curState.bookmarks||[]; curState.highlights=curState.highlights||[]; curState.chat=curState.chat||[];
  pdfDoc=await pdfjsLib.getDocument({data:buf.slice(0)}).promise;

  $('#readerTools').style.display=''; $('#togglePanel').style.display=''; $('#refMobileBtn').style.display='';
  $('#pageNav').style.display='flex'; $('#pageTotal').textContent='/ '+pdfDoc.numPages;
  $('#pageInput').max=pdfDoc.numPages; $('#pageInput').value=st.lastPage||1;
  $('#titleEl').textContent=book.name;
  await layoutPages();
  renderChat(); renderNotes(); renderMarks(); renderPins();
  requestAnimationFrame(()=>{ $('#viewer').scrollTop=(st.scrollRatio||0)*$('#viewer').scrollHeight; });
}
async function layoutPages(){
  const viewer=$('#viewer'); const ratio=viewer.scrollHeight?viewer.scrollTop/viewer.scrollHeight:0;
  viewer.innerHTML=''; placeholders=[];
  const first=await pdfDoc.getPage(1); const w1=first.getViewport({scale:1}).width;
  baseScale=Math.max(.5,(viewer.clientWidth-32)/w1);
  const scale=baseScale*cfg.zoom;
  for(let i=1;i<=pdfDoc.numPages;i++){
    const pg=await pdfDoc.getPage(i); const vp=pg.getViewport({scale});
    const wrap=document.createElement('div'); wrap.className='pageWrap placeholder';
    wrap.style.width=vp.width+'px'; wrap.style.height=vp.height+'px'; wrap.dataset.page=i; wrap.textContent=t('page')(i);
    viewer.appendChild(wrap); placeholders[i]=wrap;
  }
  if(io)io.disconnect();
  io=new IntersectionObserver(es=>es.forEach(en=>{ if(en.isIntersecting) renderPage(+en.target.dataset.page,scale); }),{root:viewer,rootMargin:'1000px'});
  placeholders.forEach(w=>{ if(w) io.observe(w); });
  requestAnimationFrame(()=>{ viewer.scrollTop=ratio*viewer.scrollHeight; });
}
async function renderPage(num,scale){
  const wrap=placeholders[num]; if(!wrap||wrap.dataset.rendered)return; wrap.dataset.rendered='1';
  wrap.classList.remove('placeholder'); wrap.textContent='';
  const pg=await pdfDoc.getPage(num); const vp=pg.getViewport({scale});
  const dpr=Math.min(window.devicePixelRatio||1,3);
  const canvas=document.createElement('canvas');
  canvas.width=Math.floor(vp.width*dpr); canvas.height=Math.floor(vp.height*dpr);
  canvas.style.width=vp.width+'px'; canvas.style.height=vp.height+'px'; wrap.appendChild(canvas);
  const tl=document.createElement('div'); tl.className='textLayer'; wrap.appendChild(tl);
  const hl=document.createElement('div'); hl.className='hlLayer'; wrap.appendChild(hl);
  await pg.render({canvasContext:canvas.getContext('2d'),viewport:vp,transform:dpr!==1?[dpr,0,0,dpr,0,0]:null}).promise;
  const tc=await pg.getTextContent();
  pdfjsLib.renderTextLayer({textContent:tc,container:tl,viewport:vp,textDivs:[]});
  drawHighlights(num);
}
function drawHighlights(num){
  const wrap=placeholders[num]; if(!wrap)return; const hl=wrap.querySelector('.hlLayer'); if(!hl)return; hl.innerHTML='';
  curState.highlights.filter(h=>h.pages&&h.pages[num]).forEach(h=>{
    h.pages[num].forEach(r=>{ const d=document.createElement('div'); d.className='hl';
      d.style.left=r.x*100+'%'; d.style.top=r.y*100+'%'; d.style.width=r.w*100+'%'; d.style.height=r.h*100+'%'; hl.appendChild(d); }); });
}

function updateBar(){
  if(snipActive||pendingImage)return;
  const sel=window.getSelection(); const tt=sel.toString().trim();
  if(tt.length>0 && $('#reader').style.display!=='none'){
    pendingImage=null; explainPending=false; bar.querySelector('[data-act=highlight]').style.display=''; bar.querySelector('[data-act=pin]').style.display='none';
    selText=tt; selGroups=rectsForSelection();
    const r=sel.getRangeAt(0).getBoundingClientRect(); selRect=r;
    bar.style.display='flex'; let top=r.top-46; if(top<6)top=r.bottom+8;
    bar.style.top=top+'px'; bar.style.left=Math.max(6,Math.min(window.innerWidth-bar.offsetWidth-6,r.left))+'px';
  } else bar.style.display='none';
}
function rectsForSelection(){
  const sel=window.getSelection(); if(!sel.rangeCount)return null; const groups={};
  for(const r of sel.getRangeAt(0).getClientRects()){
    if(r.width<1||r.height<1)continue; const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const el=document.elementsFromPoint(cx,cy).find(e=>e.classList&&e.classList.contains('pageWrap')); if(!el)continue;
    const pr=el.getBoundingClientRect(); const num=+el.dataset.page;
    (groups[num]=groups[num]||[]).push({x:(r.left-pr.left)/pr.width,y:(r.top-pr.top)/pr.height,w:r.width/pr.width,h:r.height/pr.height}); }
  return Object.keys(groups).length?groups:null;
}

async function geminiText(prompt){
  const url='https://generativelanguage.googleapis.com/v1beta/models/'+cfg.model+':generateContent?key='+encodeURIComponent(cfg.key);
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
  const data=await res.json(); if(data.error)throw new Error(data.error.message);
  return data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join('')||'';
}
async function translateInline(text){
  if(!cfg.key){ openModal(); return; }
  showTransPop(t('thinking'));
  try{ const out=await geminiText('Translate the following into '+cfg.lang+'. Output only the translation, no notes or pinyin:\n\n'+text); showTransPop(out); }
  catch(e){ showTransPop(t('netErr')+e.message); }
}
function showTransPop(text){
  const p=$('#transPop'); p.innerHTML='<div class="tpc">'+t('fTranslate')+'</div>'+escapeHtml(text); p.style.display='block';
  const r=selRect||{left:80,top:100,bottom:130};
  p.style.left=Math.max(8,Math.min(window.innerWidth-p.offsetWidth-8,r.left))+'px';
  let top=r.bottom+8; if(top+p.offsetHeight>window.innerHeight-8) top=Math.max(8,r.top-p.offsetHeight-8);
  p.style.top=top+'px';
}
document.addEventListener('pointerdown',e=>{ const p=$('#transPop'); if(p.style.display!=='none'&&!p.contains(e.target)&&!bar.contains(e.target)) p.style.display='none'; });

/* ---------- clear chat ---------- */
$('#clearChat').onclick=()=>{ if(!curState||!curState.chat.length)return; if(!confirm(t('clearConfirm')))return; curState.chat=[]; saveState(); renderChat(); };

/* ---------- snip region → image ---------- */
function setSnip(on){
  snipActive=on; document.body.classList.toggle('snip',on);
  $('#viewer').style.touchAction=on?'none':''; $('#snipBtn').classList.toggle('primary',on);
  $('#snipHint').textContent=t('snipHint');
  if(!on&&snipBox){snipBox.remove();snipBox=null;}
}
$('#snipBtn').onclick=()=>{ if(!pdfDoc)return; bar.style.display='none'; setSnip(!snipActive); };
$('#viewer').addEventListener('pointerdown',e=>{ if(!snipActive)return; e.preventDefault();
  try{ $('#viewer').setPointerCapture(e.pointerId); }catch(_){}
  snipSX=e.clientX; snipSY=e.clientY; snipBox=document.createElement('div'); snipBox.id='snipBox'; document.body.appendChild(snipBox); drawSnip(e.clientX,e.clientY); });
window.addEventListener('pointermove',e=>{ if(snipActive&&snipBox){ e.preventDefault(); drawSnip(e.clientX,e.clientY); } },{passive:false});
window.addEventListener('pointerup',()=>{ if(snipActive&&snipBox) finishSnip(); });
window.addEventListener('pointercancel',()=>{ if(snipBox){ snipBox.remove(); snipBox=null; } });
function drawSnip(x,y){ const l=Math.min(snipSX,x),tp=Math.min(snipSY,y); snipBox.style.left=l+'px'; snipBox.style.top=tp+'px'; snipBox.style.width=Math.abs(x-snipSX)+'px'; snipBox.style.height=Math.abs(y-snipSY)+'px'; }
function finishSnip(){
  const r=snipBox.getBoundingClientRect(); snipBox.remove(); snipBox=null; setSnip(false);
  if(r.width<6||r.height<6)return;
  const img=cropRegion(r); if(!img)return;
  pendingImage=img; bar.querySelector('[data-act=highlight]').style.display='none'; bar.querySelector('[data-act=pin]').style.display=''; bar.style.display='flex';
  let top=r.top-46; if(top<6)top=r.bottom+8;
  bar.style.top=top+'px'; bar.style.left=Math.max(6,Math.min(window.innerWidth-bar.offsetWidth-6,r.left))+'px';
}
function cropRegion(r){
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const wrap=document.elementsFromPoint(cx,cy).find(e=>e.classList&&e.classList.contains('pageWrap'));
  if(!wrap)return null; snipPage=+wrap.dataset.page||0; const canvas=wrap.querySelector('canvas'); if(!canvas)return null;
  const cr=canvas.getBoundingClientRect();
  const x1=Math.max(r.left,cr.left),y1=Math.max(r.top,cr.top),x2=Math.min(r.right,cr.right),y2=Math.min(r.bottom,cr.bottom);
  if(x2-x1<4||y2-y1<4)return null;
  const fx=canvas.width/cr.width, fy=canvas.height/cr.height;
  const tmp=document.createElement('canvas'); tmp.width=(x2-x1)*fx; tmp.height=(y2-y1)*fy;
  tmp.getContext('2d').drawImage(canvas,(x1-cr.left)*fx,(y1-cr.top)*fy,tmp.width,tmp.height,0,0,tmp.width,tmp.height);
  return tmp.toDataURL('image/png');
}

/* ---------- reference dock (pinned snippets) ---------- */
function syncRefToggle(){ const tg=$('#refToggle'); const on=document.body.classList.contains('refon'); tg.textContent=on?'‹':'›'; tg.style.left=on?($('#refDock').offsetWidth+'px'):'0'; }
$('#refToggle').onclick=()=>{ document.body.classList.toggle('refon'); syncRefToggle(); };
$('#refMobileBtn').onclick=()=>{ document.body.classList.toggle('refon'); syncBackdrop(); };
$('#rdClose').onclick=()=>{ document.body.classList.remove('refon'); syncBackdrop(); };
// 手机：拖参考栏标题可调整高度
document.querySelector('.rdhead').addEventListener('pointerdown',e=>{
  if(window.innerWidth>760||e.target.tagName==='BUTTON')return; e.preventDefault();
  const sy=e.clientY, sh=$('#refDock').offsetHeight;

  const up=()=>{ document.removeEventListener('pointermove',mv); document.removeEventListener('pointerup',up); };
  document.addEventListener('pointermove',mv); document.addEventListener('pointerup',up);
});
function clearRefDock(){ document.body.classList.remove('refon'); $('#rdBody').innerHTML=''; syncRefToggle(); }
function renderPins(){

  else if(!pins.length) document.body.classList.remove('refon');

    const cls=document.createElement('button'); cls.textContent='×'; cls.onclick=()=>{ curState.pins=curState.pins.filter(x=>x.id!==p.id); saveState(); renderPins(); };
    rh.append(lbl,ask,cls);
    const img=document.createElement('img'); img.src=p.image; img.title='点击放大/收起'; img.onclick=()=>img.classList.toggle('full');
    it.append(rh,img); body.appendChild(it);
  });
  syncRefToggle();
}
function addPin(image,page){ curState.pins=curState.pins||[]; curState.pins.push({id:'pin'+Date.now(),image,page:page||0}); saveState(); if(window.innerWidth>760)document.body.classList.add('refon'); $('#refDock').classList.remove('collapsed'); renderPins(); syncRefToggle(); }
$('#rdCollapse').onclick=()=>$('#refDock').classList.toggle('collapsed');
$('#rdClear').onclick=()=>{ if(!curState||!(curState.pins&&curState.pins.length))return; if(!confirm(t('clearRefConfirm')))return; curState.pins=[]; saveState(); renderPins(); };
$('#rdResize').addEventListener('pointerdown',e=>{ e.preventDefault(); const sx=e.clientX, sw=$('#refDock').offsetWidth;
  const mv=ev=>{ $('#refDock').style.width=Math.max(180,Math.min(window.innerWidth*0.6,sw+(ev.clientX-sx)))+'px'; syncRefToggle(); };
  const up=()=>{ document.removeEventListener('pointermove',mv); document.removeEventListener('pointerup',up); };
  document.addEventListener('pointermove',mv); document.addEventListener('pointerup',up);
});

/* ---------- highlight + note ---------- */
function addHighlight(){
  if(!selGroups)return;
  const note=prompt(t('notePrompt'),'')||'';
  const firstPage=Math.min(...Object.keys(selGroups).map(Number));
  const h={id:'h'+Date.now(),text:selText,note,page:firstPage,pages:selGroups,created:Date.now()};
  curState.highlights.push(h); saveState();
  Object.keys(selGroups).forEach(n=>drawHighlights(+n)); renderNotes();
  window.getSelection().removeAllRanges();
}
function renderNotes(){
  const p=$('#tab-notes'); p.innerHTML='';
  if(!curState||!curState.highlights.length){ p.innerHTML='<div class="empty-hint">'+t('notesEmpty')+'</div>'; return; }
  curState.highlights.slice().sort((a,b)=>a.page-b.page).forEach(h=>{
    const d=document.createElement('div'); d.className='note';
    d.innerHTML=`<button class="x">×</button><div class="t">${escapeHtml(h.text.slice(0,160))}${h.text.length>160?'…':''}</div>${h.note?`<div class="n">📝 ${escapeHtml(h.note)}</div>`:''}<div class="prog">${t('page')(h.page)}</div>`;
    d.querySelector('.x').onclick=e=>{e.stopPropagation(); curState.highlights=curState.highlights.filter(x=>x.id!==h.id); saveState(); Object.keys(h.pages).forEach(n=>drawHighlights(+n)); renderNotes();};
    d.onclick=()=>jumpToPage(h.page); p.appendChild(d);
  });
}

/* ---------- bookmarks ---------- */
$('#bmBtn').onclick=()=>{ const p=currentPage; const i=curState.bookmarks.indexOf(p); if(i>=0)curState.bookmarks.splice(i,1); else curState.bookmarks.push(p); saveState(); renderMarks(); openPanel('marks'); };
function renderMarks(){
  const p=$('#tab-marks'); p.innerHTML='';
  if(!curState||!curState.bookmarks.length){ p.innerHTML='<div class="empty-hint">'+t('marksEmpty')+'</div>'; return; }
  curState.bookmarks.slice().sort((a,b)=>a-b).forEach(pg=>{
    const d=document.createElement('div'); d.className='bm'; d.innerHTML=`<button class="x">×</button>${t('bmPage')(pg)}`;
    d.querySelector('.x').onclick=e=>{e.stopPropagation(); curState.bookmarks=curState.bookmarks.filter(x=>x!==pg); saveState(); renderMarks();};
    d.onclick=()=>jumpToPage(pg); p.appendChild(d);
  });
}
function jumpToPage(num){ const w=placeholders[num]; if(w){ $('#viewer').scrollTo({top:w.offsetTop-10,behavior:'smooth'}); if(window.innerWidth<=760)$('#panel').classList.remove('open'); } }

/* ---------- go to page ---------- */
function goToInput(){ if(!pdfDoc)return; let n=parseInt($('#pageInput').value,10); if(isNaN(n))return; n=Math.max(1,Math.min(pdfDoc.numPages,n)); $('#pageInput').value=n; jumpToPage(n); $('#pageInput').blur(); }
$('#pageInput').addEventListener('keydown',e=>{ if(e.key==='Enter')goToInput(); });
$('#pageInput').addEventListener('change',goToInput);
$('#prevPg').onclick=()=>jumpToPage(Math.max(1,currentPage-1));
$('#nextPg').onclick=()=>jumpToPage(Math.min(pdfDoc.numPages,currentPage+1));

/* ---------- tabs ---------- */
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>openPanel(b.dataset.tab));
function openPanel(tab){
  $('#panel').classList.remove('collapsed');
  const pt=$('#panelToggle'); if(pt){ pt.textContent='›'; pt.style.right='380px'; }
  if(window.innerWidth<=760)$('#panel').classList.add('open');
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));
  document.querySelectorAll('.tabpane').forEach(x=>x.classList.toggle('active',x.id==='tab-'+tab));
  syncBackdrop();
}
function syncBackdrop(){ const on=window.innerWidth<=760 && ($('#panel').classList.contains('open')||document.body.classList.contains('refon')); $('#sheetBackdrop').style.display=on?'block':'none'; }
$('#sheetBackdrop').onclick=()=>{ $('#panel').classList.remove('open'); document.body.classList.remove('refon'); syncBackdrop(); };
$('#togglePanel').onclick=()=>{ $('#panel').classList.toggle('open'); syncBackdrop(); };
$('#closePanel').onclick=()=>{ $('#panel').classList.remove('open'); syncBackdrop(); };
$('#panelToggle').onclick=()=>{ const col=$('#panel').classList.toggle('collapsed'); const b=$('#panelToggle'); b.textContent=col?'‹':'›'; b.style.right=col?'0':'380px'; };

/* ---------- chat ---------- */
function renderChat(){
  const c=$('#tab-chat'); c.innerHTML='';
  addMsgEl('ai',t('chatGreet'),null,false,null,true);
  (curState.chat||[]).forEach(m=>addMsgEl(m.role,m.text,m.sub,false,m.image));
  c.scrollTop=c.scrollHeight;
}
function attachCopy(d){
  if(d.querySelector('.copyBtn'))return;
  const cb=document.createElement('button'); cb.className='copyBtn'; cb.textContent=t('copy');
  cb.onclick=()=>{ navigator.clipboard.writeText(d.dataset.raw||'').then(()=>{ cb.textContent=t('copied'); setTimeout(()=>cb.textContent=t('copy'),1200); }); };
  d.appendChild(cb);
}
function addMsgEl(cls,text,sub,save,image,noCopy){
  const d=document.createElement('div'); d.className='msg '+cls;
  if(sub){const s=document.createElement('div');s.className='q';s.textContent=sub;d.appendChild(s);}
  const body=document.createElement('div'); body.className='mbody'; d.appendChild(body);
  if(image){ const im=document.createElement('img'); im.src=image; im.style.cssText='max-width:100%;border-radius:8px;margin-bottom:6px;display:block;border:1px solid var(--line)'; body.appendChild(im); }
  if(cls==='ai'){ const tb=document.createElement('div'); tb.innerHTML=mdToHtml(text); body.appendChild(tb); }
  else if(text){ const tb=document.createElement('div'); tb.textContent=text; body.appendChild(tb); }
  $('#tab-chat').appendChild(d); $('#tab-chat').scrollTop=$('#tab-chat').scrollHeight;
  if(save&&curState){ curState.chat.push({role:cls,text,sub,image}); saveState(); }
  return d;
}
$('#sendBtn').onclick=()=>{
  const inp=$('#askInput'); const q=inp.value.trim(); if(!q)return; inp.value='';
  if(pendingImage){ const im=pendingImage; pendingImage=null; ask(q,'',false,im); return; }
  const scope=$('#scope').value;
  if(scope==='sel') ask(q, selText||'');
  else if(scope==='page') ask(q, currentPageText());
  else ask(q, '', true);
};
$('#askInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('#sendBtn').click();});
function currentPageText(){ const tl=placeholders[currentPage]&&placeholders[currentPage].querySelector('.textLayer'); return tl?tl.innerText.replace(/\n+/g,' ').trim():''; }
async function buildPageTexts(){ if(pageTexts)return pageTexts; pageTexts=['']; for(let i=1;i<=pdfDoc.numPages;i++){ const pg=await pdfDoc.getPage(i); const tc=await pg.getTextContent(); pageTexts[i]=tc.items.map(x=>x.str).join(' '); } return pageTexts; }
async function buildAllText(){ if(allText)return; await buildPageTexts(); allText=pageTexts.slice(1).join('\n').slice(0,120000); }

async function ask(instruction, context, isBook, image){
  if(!cfg.key){ openModal(); openPanel('chat'); addMsgEl('ai',t('needKey'),null,false,null,true); return; }
  openPanel('chat');
  let ctx=context||'';
  if(isBook){ await buildAllText(); ctx=allText; }
  addMsgEl('me', instruction.replace(/[:：]\s*$/,''), '', true, image);
  const loading=addMsgEl('ai',t('thinking'),null,false,null,true);
  const setAI=x=>{ loading.querySelector('.mbody').innerHTML=mdToHtml(x); };
  const sys='You are a reading assistant inside an e-reader. The user is reading a book/PDF, and every question relates to that book or the selected text/image — interpret it in that context and stay on topic. Answer in '+cfg.lang+'. Match answer length to the question: keep simple questions to 1-3 sentences, and only go longer or add an example when the concept genuinely needs it. Be concise and direct. Use light Markdown only when it actually helps.';
  const userText = (ctx && !image) ? (instruction+'\n\n'+ctx) : instruction;
  const parts=[{text:userText}];
  if(image) parts.push({inline_data:{mime_type:'image/png', data:image.split(',')[1]}});
  try{
    const url='https://generativelanguage.googleapis.com/v1beta/models/'+cfg.model+':generateContent?key='+encodeURIComponent(cfg.key);
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'}, body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:[{parts}]})});
    const data=await res.json();
    if(data.error){ setAI(t('errPrefix')+data.error.message); return; }
    const out=data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join('')||t('noReturn');
    setAI(out); if(curState){ curState.chat.push({role:'ai',text:out,sub:null}); saveState(); }
  }catch(err){ setAI(t('netErr')+err.message); }
  $('#tab-chat').scrollTop=$('#tab-chat').scrollHeight;
}

/* ---------- AI 找页 / find page ---------- */
let findShown=new Set();
$('#findBtn').onclick=()=>doFind(false);
$('#findInput').addEventListener('keydown',e=>{if(e.key==='Enter')doFind(false);});
function addFindResult(box,it){
  const p=Math.max(1,Math.min(pdfDoc.numPages,it.page));
  const d=document.createElement('div'); d.className='bm';
  d.innerHTML=t('findPage')(p)+(it.reason?'<div class="n" style="font-style:italic;color:var(--muted);font-size:12px;margin-top:4px">'+escapeHtml(it.reason)+'</div>':'');
  d.onclick=()=>jumpToPage(p); box.appendChild(d);
}
function addMoreBtn(box){
  const b=document.createElement('button'); b.className='btn'; b.style.marginTop='4px'; b.textContent=t('findMore');
  b.onclick=()=>doFind(true); box.appendChild(b);
}
async function doFind(more){
  const q=$('#findInput').value.trim(); if(!q||!pdfDoc)return;
  if(!cfg.key){ openModal(); return; }
  const box=$('#findResults');
  if(!more){ findShown=new Set(); box.innerHTML='<div class="empty-hint">'+t('findThinking')+'</div>'; }
  else { const old=box.querySelector('button'); if(old){old.textContent=t('findThinking');old.disabled=true;} }
  await buildPageTexts();
  const terms=q.toLowerCase().split(/[\s，,、。.]+/).filter(w=>w.length>1);
  const scored=[]; for(let i=1;i<pageTexts.length;i++){ if(findShown.has(i))continue; const low=pageTexts[i].toLowerCase(); let s=0; terms.forEach(tm=>{ if(low.includes(tm))s++; }); scored.push([i,s]); }
  scored.sort((a,b)=>b[1]-a[1]);
  let cand=scored.filter(x=>x[1]>0).slice(0,30).map(x=>x[0]);
  if(cand.length<3) cand=scored.slice(0,Math.min(40,scored.length)).map(x=>x[0]);
  cand.sort((a,b)=>a-b);
  if(!cand.length){ if(more){const old=box.querySelector('button'); if(old)old.replaceWith(Object.assign(document.createElement('div'),{className:'empty-hint',textContent:t('findNoMore')}));} else box.innerHTML='<div class="empty-hint">'+t('findNone')+'</div>'; return; }
  let ctx=''; for(const p of cand){ ctx+='[Page '+p+'] '+pageTexts[p].slice(0,1200)+'\n'; if(ctx.length>110000)break; }
  const excl=findShown.size? (' Do NOT return any of these already-shown pages: '+[...findShown].join(', ')+'.'):'';
  const sys='You locate pages in a book. Given the user query and page-tagged text, return the most relevant pages by relevance.'+excl+' Output ONLY a JSON array, each item {"page":number,"reason":"one short sentence in '+cfg.lang+' on what that page covers"}, max 5 items, no other text.';
  try{
    const url='https://generativelanguage.googleapis.com/v1beta/models/'+cfg.model+':generateContent?key='+encodeURIComponent(cfg.key);
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'}, body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:[{parts:[{text:'Query: '+q+'\n\n'+ctx}]}]})});
    const data=await res.json();
    if(data.error){ box.innerHTML='<div class="empty-hint">'+t('errPrefix')+escapeHtml(data.error.message)+'</div>'; return; }
    let out=(data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join('')||'').trim().replace(/```json/gi,'').replace(/```/g,'').trim();
    let items=[]; try{ items=JSON.parse(out); }catch(e){ const m=out.match(/\d+/g); if(m)items=[...new Set(m.map(Number))].slice(0,5).map(p=>({page:p,reason:''})); }
    items=items.filter(it=>!findShown.has(Math.max(1,Math.min(pdfDoc.numPages,it.page))));
    if(!more) box.innerHTML=''; else { const old=box.querySelector('button'); if(old)old.remove(); }
    if(!items.length){ const d=document.createElement('div'); d.className='empty-hint'; d.textContent=more?t('findNoMore'):t('findNone'); box.appendChild(d); return; }
    items.forEach(it=>{ findShown.add(Math.max(1,Math.min(pdfDoc.numPages,it.page))); addFindResult(box,it); });
    addMoreBtn(box);
  }catch(err){ box.innerHTML='<div class="empty-hint">'+t('netErr')+escapeHtml(err.message)+'</div>'; }
}

/* ---------- settings ---------- */
const KNOWN_MODELS=[...$('#model').options].map(o=>o.value);
function openModal(){
  $('#apiKey').value=cfg.key; $('#lang').value=cfg.lang;
  if(KNOWN_MODELS.includes(cfg.model)&&cfg.model!=='__custom'){ $('#model').value=cfg.model; $('#modelCustom').style.display='none'; $('#modelCustom').value=''; }
  else { $('#model').value='__custom'; $('#modelCustom').style.display='block'; $('#modelCustom').value=cfg.model; }
  $('#modal').style.display='flex';
}
$('#model').onchange=()=>{ const c=$('#model').value==='__custom'; $('#modelCustom').style.display=c?'block':'none'; if(c)$('#modelCustom').focus(); };
$('#settingsBtn').onclick=openModal;
$('#closeModal').onclick=()=>$('#modal').style.display='none';
$('#saveSettings').onclick=()=>{
  cfg.key=$('#apiKey').value.trim();
  cfg.model = $('#model').value==='__custom' ? ($('#modelCustom').value.trim()||'gemini-2.5-flash-lite') : $('#model').value;
  cfg.lang=$('#lang').value;
  localStorage.setItem('air_key',cfg.key); localStorage.setItem('air_model',cfg.model); localStorage.setItem('air_lang',cfg.lang);

};
